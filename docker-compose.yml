networks:
    prison_network:
        driver: bridge


volumes:
    postgres_vector_data:
    minio_data:

services:


    db:
        image: pgvector/pgvector:pg16
        container_name: postgres_vector
        restart: always
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: mypassword
            POSTGRES_DB: postgres
        ports:
            - "5433:5432"
        volumes:
            - postgres_vector_data:/var/lib/postgresql/data
        networks:
            - prison_network

    
    storage:
        image: minio/minio:latest
        container_name: minio_local
        restart: always
        environment:
            MINIO_ROOT_USER: admin
            MINIO_ROOT_PASSWORD: superpassword123
        ports:
            - "9000:9000"
            - "9001:9001"
        volumes:
            - minio_data:/data
        networks:
            - prison_network

        command: server /data --console-address ":9001"